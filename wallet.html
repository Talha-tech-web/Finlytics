        Wallet

      <a class="nav-item" data-page="analytics" href="analytics.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>

      <a class="nav-item" data-page="reports" href="reports.html">

      <a class="nav-item" data-page="settings" href="settings.html">

        Settings

  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="icon-btn hamburger" data-hamburger>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-left">
          <div class="page-title">Wallet</div>
          <div class="page-date" data-clock></div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="badge" data-notif-badge>1</span></button>
        <button class="icon-btn" data-global-mic title="Voice Assistant (hands-free, works on any page)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></button>
        <button class="icon-btn" data-theme-toggle><span data-theme-icon></span></button>
        <a class="btn-ai" href="assistant.html">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 5.2L19 9l-5.4 1.8L12 16l-1.6-5.2L5 9l5.4-1.8L12 2z"/></svg>
          Ask AI
        </a>
        <div class="user-chip">
          <div class="avatar" data-user-initial>T</div>
          <div class="uname" data-user-name>Talha</div>
        </div>
      </div>
    </header>

    <main class="content">      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
        <button class="pill active" data-tab="accounts">Accounts</button>
        <button class="pill" data-tab="budgets">Budgets</button>
        <button class="pill" data-tab="goals">Goals</button>
        <button class="pill" data-tab="recurring">Recurring</button>
      </div>

      <div data-tab-panel="accounts">
        <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
          <button class="btn btn-accent" id="openAddAccount">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Account
          </button>
        </div>
        <div class="grid grid-2-even" id="accountsGrid"></div>
      </div>

      <div data-tab-panel="budgets" style="display:none">
        <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
          <button class="btn btn-accent" id="openAddBudget">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Budget
          </button>
        </div>
        <div id="budgetsList"></div>
      </div>

      <div data-tab-panel="goals" style="display:none">
        <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
          <button class="btn btn-accent" id="openAddGoal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Goal
          </button>
        </div>
        <div id="goalsList"></div>
      </div>

      <div data-tab-panel="recurring" style="display:none">
        <div class="card">
          <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
            <button class="btn btn-accent" id="openAddRecurring">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Recurring
            </button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Description</th><th>Category</th><th>Frequency</th><th>Next Date</th><th>Amount</th><th></th></tr></thead>
              <tbody id="recurringTbody"></tbody>
            </table>
          </div>
        </div>
      </div>
<div class="modal-overlay" id="accountModal">
  <div class="modal">
    <div class="modal-head"><h3>Account</h3><button class="modal-close" data-close-modal>&times;</button></div>
    <form id="accountForm">
      <input type="hidden" name="accId">
      <div class="field"><label>Name</label><input type="text" name="accName" required></div>
      <div class="field"><label>Type</label>
        <select name="accType">
          <option value="cash">Cash</option><option value="bank">Bank</option>
          <option value="credit_card">Credit Card</option><option value="savings">Savings</option>
        </select>
      </div>
      <div class="field"><label>Balance</label><input type="number" step="0.01" name="accBalance" required></div>
      <button class="btn btn-primary btn-block" type="submit">Save Account</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="budgetModal">
  <div class="modal">
    <div class="modal-head"><h3>Add Budget</h3><button class="modal-close" data-close-modal>&times;</button></div>
    <form id="budgetForm">
      <div class="field"><label>Category</label><input type="text" name="budgetCategory" required></div>
      <div class="field"><label>Monthly Limit</label><input type="number" step="0.01" name="budgetLimit" required></div>
      <button class="btn btn-primary btn-block" type="submit">Save Budget</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <div class="modal-head"><h3>Add Goal</h3><button class="modal-close" data-close-modal>&times;</button></div>
    <form id="goalForm">
      <div class="field"><label>Goal name</label><input type="text" name="goalName" required></div>
      <div class="field-row">
        <div class="field"><label>Target amount</label><input type="number" step="0.01" name="goalTarget" required></div>
        <div class="field"><label>Already saved</label><input type="number" step="0.01" name="goalSaved" value="0"></div>
      </div>
      <div class="field"><label>Target date</label><input type="date" name="goalDate"></div>
      <button class="btn btn-primary btn-block" type="submit">Save Goal</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="recurringModal">
  <div class="modal">
    <div class="modal-head"><h3>Add Recurring Item</h3><button class="modal-close" data-close-modal>&times;</button></div>
    <form id="recurringForm">
      <div class="field"><label>Description</label><input type="text" name="recDesc" required></div>
      <div class="field-row">
        <div class="field"><label>Type</label>
          <select name="recType"><option value="expense">Expense</option><option value="income">Income</option></select>
        </div>
        <div class="field"><label>Amount</label><input type="number" step="0.01" name="recAmount" required></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Category</label><input type="text" name="recCategory" placeholder="e.g. Rent"></div>
        <div class="field"><label>Frequency</label>
          <select name="recFreq"><option value="weekly">Weekly</option><option value="monthly" selected>Monthly</option><option value="yearly">Yearly</option></select>
        </div>
      </div>
      <div class="field"><label>Next date</label><input type="date" name="recDate"></div>
      <button class="btn btn-primary btn-block" type="submit">Save</button>
    </form>
  </div>
</div>
</main>
  </div>
</div>

</body>
