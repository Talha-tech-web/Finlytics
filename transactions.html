  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="icon-btn hamburger" data-hamburger>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-left">
          <div class="page-title">Transactions</div>
          <div class="page-date" data-clock></div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="badge" data-notif-badge>1</span></button>
        <button class="icon-btn" data-global-mic title="Voice Assistant (hands-free, works on any page)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></button>
        <button class="icon-btn" data-theme-toggle><span data-theme-icon></span></button>
        <a class="btn-ai" href="assistant.html">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 5.2L19 9l-5.4 1.8L12 16l-1.6-5.2L5 9l5.4-1.8L12 2z"/></svg>
          Ask AI
        </a>
        <div class="user-chip">
          <div class="avatar" data-user-initial>A</div>
          <div class="uname" data-user-name>Talha</div>
        </div>
      </div>
    </header>

    <main class="content">      <div class="card" style="margin-bottom:18px">
        <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="pill active" data-filter="all">All</button>
            <button class="pill" data-filter="income">Income</button>
            <button class="pill" data-filter="expense">Expense</button>
            <button class="pill" data-filter="transfer">Transfer</button>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <label for="csvUpload" class="btn" style="margin:0;cursor:pointer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload File
            </label>
            <input type="file" id="csvUpload" accept=".csv,.tsv,.txt,.json,.xlsx,.xls" style="display:none">
            <button class="btn" id="exportCsv">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export CSV
            </button>
            <button class="btn btn-accent" id="openAddTxn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Transaction
            </button>
          </div>
        </div>
        <div class="search-input" style="margin-bottom:16px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="txnSearch" placeholder="Search transactions, accounts, categories...">
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Account</th><th>Type</th><th>Amount</th><th></th></tr></thead>
            <tbody id="txnTbody"></tbody>
          </table>
        </div>
        <div style="margin-top:12px;font-size:12.5px;color:var(--ink-faint)" id="txnCount"></div>
      </div>
<div class="modal-overlay" id="addTxnModal">
  <div class="modal">
    <div class="modal-head"><h3>Add Transaction</h3><button class="modal-close" data-close-modal>&times;</button></div>
    <form id="addTxnForm">
      <div class="field-row">
        <div class="field"><label>Type</label>
          <select name="txType" id="">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="field"><label>Date</label><input type="date" name="txDate" required></div>
      </div>
      <div class="field"><label>Description</label><input type="text" name="txDesc" placeholder="e.g. Grocery Run" required></div>
      <div class="field-row">
        <div class="field"><label>Category</label><input type="text" name="txCategory" placeholder="e.g. Groceries" required></div>
        <div class="field"><label>Amount</label><input type="number" step="0.01" name="txAmount" placeholder="0.00" required></div>
      </div>
      <div class="field"><label>Account</label><select name="txAccount" id="txAccountSelect"></select></div>
      <button class="btn btn-primary btn-block" type="submit">Add Transaction</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="importPreviewModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-head"><h3>Review Import</h3><button class="modal-close" data-close-import>&times;</button></div>
    <div id="importSummary" style="font-size:13px;color:var(--ink-dim);margin-bottom:12px;line-height:1.6"></div>
    <div id="importUnmapped" style="font-size:12px;color:var(--warning);margin-bottom:12px;display:none"></div>
    <div class="table-wrap" style="max-height:320px;overflow-y:auto;margin-bottom:16px">
      <table>
        <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th></tr></thead>
        <tbody id="importPreviewTbody"></tbody>
      </table>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-block" type="button" id="importCancelBtn">Cancel</button>
      <button class="btn btn-primary btn-block" type="button" id="importConfirmBtn">Import Transactions</button>
    </div>
  </div>
</div>
</main>
  </div>
</div>
